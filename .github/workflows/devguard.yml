# .github/workflows/devguard.yml
name: DevGuard Workflow

on:
  push:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
    test:
        name: tests
        runs-on: ubuntu-latest
        permissions:
          contents: read
        steps:
          - uses: actions/checkout@v4
            with:
              persist-credentials: false
          - uses: cachix/install-nix-action@v31
            with:
              install_url: https://releases.nixos.org/nix/nix-2.34.4/install
              extra_nix_config: |
                experimental-features = nix-command flakes
          - name: Run tests
            run: nix develop . --command bash -c "go test ./..."

    call-devsecops:
        uses: l3montree-dev/devguard-ci-components/.github/workflows/code-scanning.yml@main
        permissions:
          contents: read
          security-events: write
        with:
            devguard-asset-name: "l3montree-cybersecurity/projects/devguard/assets/devguard-k8s-image-inventory"
            devguard-api-url: "https://api.main.devguard.org"
            devguard-web-ui: "https://main.devguard.org"
        secrets:
            devguard-token: "${{ secrets.DEVGUARD_TOKEN }}"

    image-pipeline:
        if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'
        needs: [test]
        uses: l3montree-dev/devguard-ci-components/.github/workflows/full-nix.yml@main
        permissions:
          contents: read
          packages: write
          security-events: write
        with:
          nix-target-amd64: devguard-k8s-image-inventory-amd64
          nix-target-arm64: devguard-k8s-image-inventory-arm64
          nix-version: '2.34.4'
          image-name: ghcr.io/${{ github.repository }}
          devguard-asset-name: l3montree-cybersecurity/projects/devguard/assets/devguard-k8s-image-inventory
          devguard-api-url: https://api.main.devguard.org
          devguard-web-ui: https://main.devguard.org
        secrets:
          devguard-token: ${{ secrets.DEVGUARD_TOKEN }}

    release:
        if: startsWith(github.ref, 'refs/tags/')
        needs: [test, image-pipeline]
        uses: l3montree-dev/devguard-ci-components/.github/workflows/release.yml@main
        permissions:
            contents: write
        with:
            release-tag: ${{ github.ref_name }}
            release-name: "devguard-k8s-image-inventory ${{ github.ref_name }}"
            prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') }}
            release-description: |
                # devguard-k8s-image-inventory ${{ github.ref_name }}

                A tool that continuously scans all container images running in your Kubernetes cluster and reports them to [DevGuard](https://main.devguard.org). It generates an SBOM for each image using Trivy, uploads it to DevGuard organized by namespace and workload, and automatically removes entries when images are no longer running.

                ## Installation

                **1. Create the token secret**
                ```bash
                kubectl create namespace devguard

                kubectl create secret generic devguard-k8s-image-inventory \
                  --namespace devguard \
                  --from-literal=devguard-token=<your-devguard-token>
                ```

                **2. Set your project URL in `deployment.yaml`, then apply**
                ```bash
                kubectl apply -f https://github.com/l3montree-dev/devguard-k8s-image-inventory/releases/download/${{ github.ref_name }}/rbac.yaml
                kubectl apply -f https://github.com/l3montree-dev/devguard-k8s-image-inventory/releases/download/${{ github.ref_name }}/deployment.yaml
                ```

                ## Container image

                ```bash
                docker pull ghcr.io/l3montree-dev/devguard-k8s-image-inventory:${{ github.ref_name }}
                ```

                ---

                📖 [Full documentation](https://docs.devguard.org/how-to-guides/integrations/k8s-image-inventory/)
                🐛 [Report an issue](https://github.com/l3montree-dev/devguard-k8s-image-inventory/issues)
