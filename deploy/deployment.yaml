apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/name: devguard-k8s-image-inventory
  name: devguard-k8s-image-inventory
  namespace: devguard
  annotations:
    checkov.io/skip1: "CKV_K8S_43=Image digest is resolved by the CI pipeline at deploy time"
    checkov.io/skip2: "CKV_K8S_38=Operator requires SA token to access the Kubernetes API"
    checkov.io/skip3: "CKV_K8S_15=imagePullPolicy is managed by the deployment pipeline"
    checkov.io/skip4: "CKV2_K8S_6=NetworkPolicy is managed separately per cluster"
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: devguard-k8s-image-inventory
  template:
    metadata:
      labels:
        app.kubernetes.io/name: devguard-k8s-image-inventory
    spec:
      containers:
      - image: ghcr.io/l3montree-dev/devguard-k8s-image-inventory:main-amd64
        name: operator
        env:
          - name: POD_NAMESPACE
            valueFrom:
              fieldRef:
                fieldPath: metadata.namespace
          - name: DEVGUARD_PROJECT_URL
            value: "https://api.main.devguard.org/api/v1/organizations/l3montree-cybersecurity/projects/cluster/external"
          - name: DEVGUARD_TOKEN_FILE
            value: /etc/devguard/token
        ports:
        - containerPort: 8081
          name: http
          protocol: TCP
        securityContext:
          capabilities:
            drop:
            - ALL
          allowPrivilegeEscalation: false
          privileged: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 53111
          seccompProfile:
            type: RuntimeDefault
        volumeMounts:
          - mountPath: /work
            name: work
          - mountPath: /tmp
            name: tmp
          - mountPath: /etc/devguard
            name: devguard-token
            readOnly: true
        resources:
          limits:
            cpu: 500m
            memory: 1Gi
          requests:
            cpu: 100m
            memory: 100Mi
        livenessProbe:
          timeoutSeconds: 3
          httpGet:
            path: "/health"
            port: 8081
        readinessProbe:
          timeoutSeconds: 3
          httpGet:
            path: "/health"
            port: 8081
      volumes:
        - name: work
          emptyDir: {}
        - name: tmp
          emptyDir: {}
        - name: devguard-token
          secret:
            secretName: devguard-k8s-image-inventory
            items:
              - key: devguard-token
                path: token
      automountServiceAccountToken: true
      securityContext:
        fsGroup: 53111
      serviceAccountName: devguard-k8s-image-inventory